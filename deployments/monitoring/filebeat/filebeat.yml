filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/rsbp/alerts.jsonl
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: id
    close_renamed: false
    close_removed: false
    clean_removed: false

processors:
  - timestamp:
      field: timestamp
      target_field: "@timestamp"
      layouts:
        - RFC3339
        - '2006-01-02T15:04:05.999999999Z07:00'
      timezone: UTC
      ignore_failure: true
  - add_fields:
      target: ""
      fields:
        environment: production
        host_type: wsl2

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  # Match the Grafana datasource + dashboard index pattern (rsbp-alerts-*).
  index: "rsbp-alerts-%{+yyyy.MM.dd}"

setup.ilm.enabled: false
setup.template.enabled: false
